<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Search Engine - Free</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-6">



    <div class="w-full max-w-3xl">

        <header class="text-center mb-10">

            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">

                Gemini Lite

            </h1>

            <p class="text-slate-400 mt-2">Real-time web search powered by Open Source AI</p>

        </header>



        <div class="relative group">

            <input id="query" type="text" placeholder="Ask me anything about today..." 

                class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all pr-16 shadow-2xl">

            <button onclick="startSearch()" class="absolute right-3 top-2 bottom-2 px-4 bg-blue-600 rounded-xl hover:bg-blue-500 transition-colors font-bold">

                Go

            </button>

        </div>



        <div id="status" class="mt-4 text-sm text-slate-500 text-center animate-pulse hidden">Searching the live web...</div>

        

        <div id="resultBox" class="mt-8 space-y-6 hidden">

            <div class="p-6 bg-slate-800/50 border border-slate-700 rounded-3xl backdrop-blur-sm">

                <h3 class="text-blue-400 font-bold mb-3 uppercase text-xs tracking-widest">AI Summary</h3>

                <p id="aiAnswer" class="text-slate-200 leading-relaxed text-lg">Thinking...</p>

            </div>



            <div id="sourceLinks" class="grid grid-cols-1 md:grid-cols-2 gap-3">

                </div>

        </div>

    </div>



    <script>

        // REPLACE THIS with your free token from https://huggingface.co/settings/tokens

        const HF_TOKEN = "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"; 



        async function startSearch() {

            const query = document.getElementById('query').value;

            const status = document.getElementById('status');

            const resultBox = document.getElementById('resultBox');

            const answerEl = document.getElementById('aiAnswer');

            const sourcesEl = document.getElementById('sourceLinks');



            if (!query) return;



            // Reset UI

            status.classList.remove('hidden');

            resultBox.classList.add('hidden');

            sourcesEl.innerHTML = '';

            answerEl.innerText = "Processing search results...";



            try {

                // 1. WEB SEARCH (Using a free public search API)

                const searchRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://ddg-api.herokuapp.com/search?q=' + query)}`);

                const searchData = await searchRes.json();

                const items = JSON.parse(searchData.contents).slice(0, 3); // Get top 3 results



                status.innerText = "AI is synthesizing an answer...";

                resultBox.classList.remove('hidden');



                // Create context for AI

                const context = items.map(i => `Title: ${i.title}\nContent: ${i.snippet}`).join("\n\n");



                // 2. AI GENERATION (Calling Hugging Face for Free)

                const aiRes = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3", {

                    method: "POST",

                    headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },

                    body: JSON.stringify({

                        inputs: `Use the web results below to answer the query: "${query}"\n\nResults:\n${context}\n\nAnswer:`,

                        parameters: { max_new_tokens: 250 }

                    })

                });



                const aiData = await aiRes.json();

                let fullText = aiData[0].generated_text;

                let answer = fullText.split("Answer:")[1] || fullText;



                // Update UI

                answerEl.innerText = answer.trim();

                items.forEach(item => {

                    sourcesEl.innerHTML += `

                        <a href="${item.link}" target="_blank" class="p-3 bg-slate-800 border border-slate-700 rounded-xl hover:bg-slate-700 transition block">

                            <div class="text-sm font-bold truncate">${item.title}</div>

                            <div class="text-xs text-slate-500 truncate">${item.link}</div>

                        </a>`;

                });



            } catch (err) {

                answerEl.innerText = "Error: Make sure your HF_TOKEN is valid!";

                console.error(err);

            } finally {

                status.classList.add('hidden');

            }

        }

    </script>

</body>

</html>
